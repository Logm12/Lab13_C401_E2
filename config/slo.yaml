service: day13-observability-lab
window: 28d
slis:
  latency_p95_ms:
    objective: 3000
    target: 99.5
    note: Interactive chat requests should remain below 3s at P95.
  error_rate_pct:
    objective: 2
    target: 99.0
    note: Failed requests should stay under 2 percent over the 28-day window.
  daily_cost_usd:
    objective: 2.5
    target: 100.0
    note: Keep demo traffic under the daily cost budget.
  quality_score_avg:
    objective: 0.75
    target: 95.0
    note: Heuristic answer quality should remain at or above 0.75 on average.
